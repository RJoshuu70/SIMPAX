# ============================================================
# Docker Compose - Tahap 2 & 3: PostgreSQL + Backend + APISIX + etcd
#
# File ini DIPERLUAS dari versi Tahap 2 untuk menambahkan Apache
# APISIX dan etcd (domain Zaskia). Apache Syncope dan Apache Fortress
# akan ditambahkan pada tahap berikutnya.
#
# Cara pakai:
#   1. Pastikan file .env sudah ada di root project (copy dari .env.example)
#   2. docker compose up -d --build
#   3. docker compose logs -f backend   (untuk lihat log startup backend)
#   4. docker compose down              (untuk stop & hapus container)
#   5. docker compose down -v           (stop + HAPUS volume database -
#      gunakan hati-hati, ini akan menghapus seluruh data!)
# ============================================================

services:
  postgres:
    image: postgres:16
    container_name: simpax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simpax}
      POSTGRES_USER: ${POSTGRES_USER:-simpax_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - simpax_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-simpax_admin} -d ${POSTGRES_DB:-simpax}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - simpax-network

  backend:
    build:
      context: ./simpax-app
      dockerfile: Dockerfile
    container_name: simpax-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      syncope:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-simpax}
      POSTGRES_USER: ${POSTGRES_USER:-simpax_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev_only}
      JWT_PRIVATE_KEY_PATH: /app/config/keys/simpax-private.pem
      JWT_PUBLIC_KEY_PATH: /app/config/keys/simpax-public.pem
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      SYNCOPE_HOST: syncope
      SYNCOPE_PORT: 8080
      SYNCOPE_ADMIN_USER: ${SYNCOPE_ADMIN_USER:-admin}
      SYNCOPE_ADMIN_PASSWORD: ${SYNCOPE_ADMIN_PASSWORD:-password}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./simpax-app/config/keys:/app/config/keys:ro
    networks:
      - simpax-network

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.9
    container_name: simpax-etcd
    restart: unless-stopped
    entrypoint: /usr/local/bin/etcd
    command:
      - --name=simpax-etcd-node
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=simpax-etcd-node=http://etcd:2380
      - --initial-cluster-token=simpax-etcd-token
      - --initial-cluster-state=new
      - --enable-v2=true
    ports:
      - "${ETCD_PORT:-2379}:2379"
    volumes:
      - simpax_etcd_data:/etcd-data
    networks:
      - simpax-network

  apisix:
    image: apache/apisix:3.10.0-debian
    container_name: simpax-apisix
    restart: unless-stopped
    depends_on:
      - etcd
    environment:
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:-ganti_dengan_admin_key_apisix}
    ports:
      - "${APISIX_HTTP_PORT:-9080}:9080"
      - "${APISIX_ADMIN_PORT:-9180}:9180"
    volumes:
      - ./infra/apisix/apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    networks:
      - simpax-network

  syncope:
    image: apache/syncope:4.1.1
    container_name: simpax-syncope
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,postgresql,saml2
      DB_URL: jdbc:postgresql://postgres:5432/syncope?stringtype=unspecified
      DB_USER: ${POSTGRES_USER:-simpax_admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev_only}
      DB_POOL_MAX: 20
      DB_POOL_MIN: 5
      OPENJPA_REMOTE_COMMIT: sjvm
      KEYMASTER_ADDRESS: http://localhost:8080/syncope/rest/keymaster
      KEYMASTER_USERNAME: ${ANONYMOUS_USER:-anonymous}
      KEYMASTER_PASSWORD: ${ANONYMOUS_KEY:-anonymouskey}
      SERVICE_DISCOVERY_ADDRESS: http://syncope:8080/syncope/rest/
      ANONYMOUS_USER: ${ANONYMOUS_USER:-anonymous}
      ANONYMOUS_KEY: ${ANONYMOUS_KEY:-anonymouskey}
    ports:
      - "${SYNCOPE_PORT:-8081}:8080"
    networks:
      - simpax-network

  openldap:
    image: osixia/openldap:1.5.0
    container_name: simpax-openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "SIMPAX"
      LDAP_DOMAIN: "simpax.local"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-ldap_admin_pass}
    ports:
      - "389:389"
    networks:
      - simpax-network
    volumes:
      - simpax_ldap_data:/var/lib/ldap
      - simpax_ldap_config:/etc/ldap/slapd.d

networks:
  simpax-network:
    driver: bridge

volumes:
  simpax_postgres_data:
  simpax_etcd_data:
  simpax_syncope_data:
  simpax_ldap_data:
  simpax_ldap_config:
