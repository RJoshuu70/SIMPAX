# ===================================================================
# Profile "dev" - dipakai saat development lokal di laptop masing-masing
# anggota tim, ataupun saat berjalan di dalam docker-compose lokal.
# Aktifkan profile ini dengan: -Dspring.profiles.active=dev
# (atau di IDE: set Active profiles = dev pada run configuration)
# ===================================================================

spring:
  datasource:
    # Nilai diambil dari environment variable agar kredensial TIDAK
    # hardcode di file yang ter-commit ke Git - selaras dengan .env.example
    # yang sudah disiapkan di root repo. Nilai fallback setelah ":" hanya
    # untuk kenyamanan development lokal tanpa file .env, BUKAN untuk
    # dipakai di production.
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:simpax}
    username: ${POSTGRES_USER:simpax_admin}
    password: ${POSTGRES_PASSWORD:changeme_local_dev_only}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool kecil cukup untuk kebutuhan development/demo,
      # bukan untuk production traffic sesungguhnya.
      maximum-pool-size: 5

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    id.ac.upnvj.simpax: DEBUG
    org.hibernate.SQL: DEBUG

# ===================================================================
# Konfigurasi JWT RS256 - lihat security.jwt.TokenProvider
# Path keypair akan digenerate via script terpisah (lihat scripts/),
# JANGAN commit file .pem/.key asli ke Git (sudah masuk .gitignore).
# ===================================================================
simpax:
  security:
    jwt:
      private-key-path: ${JWT_PRIVATE_KEY_PATH:/app/config/keys/simpax-private.pem}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:/app/config/keys/simpax-public.pem}
      token-validity-in-minutes: ${JWT_EXPIRY_MINUTES:15}
      issuer: simpax-backend

# ===================================================================
# Konfigurasi Spring LDAP → OpenLDAP (untuk FortressRbacService)
# OpenLDAP berjalan sebagai container Docker di port 389
# ===================================================================
spring:
  ldap:
    urls: ldap://${LDAP_HOST:localhost}:${LDAP_PORT:389}
    base: dc=simpax,dc=local
    username: cn=admin,dc=simpax,dc=local
    password: ${LDAP_ADMIN_PASSWORD:ldap_admin_pass}
# ===================================================================
# Konfigurasi Spring LDAP → OpenLDAP (untuk FortressRbacService)
# ===================================================================
spring:
  ldap:
    urls: ldap://${LDAP_HOST:localhost}:${FORTRESS_LDAP_PORT:389}
    base: dc=simpax,dc=local
    username: cn=admin,dc=simpax,dc=local
    password: ${LDAP_ADMIN_PASSWORD:ldap_admin_pass}
